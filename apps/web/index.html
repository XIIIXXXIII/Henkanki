<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b0d10"><link rel="manifest" href="/public/manifest.webmanifest"><link rel="stylesheet" href="/src/styles.css"><title>Henkanki</title></head><body><main class="shell"><section class="hero"><p class="mark">変換器</p><h1>Henkanki</h1><p>Local-first universal file converter. No database. No required upload. Your files stay on your device.</p></section><section class="panel"><label class="drop"><input id="file" type="file"><span>Choose a text file</span></label><div class="grid"><select id="from"><option value="json">JSON</option><option value="yaml">YAML</option><option value="csv">CSV</option><option value="md">Markdown</option></select><span>→</span><select id="to"><option value="yaml">YAML</option><option value="json">JSON</option><option value="html">HTML</option><option value="txt">TXT</option></select></div><button id="convert">Convert locally</button><pre id="output" aria-live="polite"></pre><a id="download" hidden>Download result</a></section></main><script type="module" src="/src/main.mjs"></script></body></html>
